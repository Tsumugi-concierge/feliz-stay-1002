<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking — Feliz Stay 1002</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root{--accent:#2e7d45;--accent-light:#b2d9be;--cream:#f4faf5;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--cream);color:#3a3232;min-height:100vh;display:flex;flex-direction:column;}
  .top-bar{background:linear-gradient(135deg,var(--accent) 0%,color-mix(in srgb,var(--accent) 70%,black) 100%);padding:16px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
  .back-btn{background:rgba(255,255,255,0.25);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;color:#fff;text-decoration:none;flex-shrink:0;}
  .back-btn:hover{background:rgba(255,255,255,0.4);}
  .top-title{font-family:'Pacifico',cursive;font-size:1.3rem;color:#fff;flex:1;}
  .top-emoji{font-size:1.8rem;}
  .content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;}
  .icon{font-size:4rem;margin-bottom:20px;}
  .title{font-family:'Pacifico',cursive;font-size:1.4rem;color:var(--accent);margin-bottom:10px;}
  .subtitle{font-size:1rem;color:#6b5a5a;margin-bottom:8px;}
  .note{font-size:0.85rem;color:#9a8585;background:#fff;border-radius:12px;padding:14px 20px;margin-top:20px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .back-footer{text-align:center;padding:24px 0 32px;}
  .back-footer a{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;text-decoration:none;padding:12px 28px;border-radius:50px;font-weight:800;font-size:0.9rem;}
</style>
</head>
<body>
<div class="top-bar">
  <a href="../" class="back-btn">&#x2190;</a>
  <span class="top-emoji">🅿️</span>
  <div class="top-title">Parking</div>
</div>
<div class="content">
  <div class="icon">🅿️</div>
  <div class="title">Parking</div>
  <div class="subtitle">駐車場情報</div>
  <div class="note">🚧 This page is being prepared.<br>準備中です。もうしばらくお待ちください。</div>
</div>
<div class="back-footer">
  <a href="../">&#x2190; Back to Menu</a>
</div>
</body>
</html>
